services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autoparts
      POSTGRES_PASSWORD: autoparts
      POSTGRES_DB: autoparts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoparts -d autoparts"]
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  app:
    build: .
    environment:
      DB_HOST: db
      DB_USER: autoparts
      DB_PASSWORD: autoparts
      DB_NAME: autoparts
      DB_PORT: 5432
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://maksimpopyvanov-autoparts-a36b.twc1.net:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - app
